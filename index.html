<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Disaster Image Classifier</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

  <button id="toggle" aria-label="Toggle theme">
   <i class="fa-solid fa-circle-half-stroke"></i>
</button>
  <h1>SafeHaven: Multi-Disaster Prediction using Deep CNN</h1>
  <p class="subtitle">Ensemble · EfficientNetV2 + ConvNeXt + DenseNet201</p>

  <div class="card">

    <!-- Drop zone -->
    <div id="drop-zone">
      <div class="icon">📷</div>
      <p>Drag & drop an image here<br>or <span onclick="document.getElementById('file-input').click()">browse files</span></p>
      <input type="file" id="file-input" accept="image/*" />
    </div>

    <!-- Preview -->
    <div id="preview-wrap">
      <img id="preview-img" src="" alt="preview" />
      <div class="change-btn" onclick="resetUI()">✕ Remove image</div>
    </div>

    <!-- Button -->
    <button id="classify-btn" disabled onclick="classify()">
      <span id="btn-text">Select an image first</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <!-- Error -->
    <div id="error-box"></div>

    <!-- Results -->
    <div id="result-box">
      <div class="result-label">Prediction</div>
      <div class="predicted-class" id="pred-class">—</div>
      <div class="confidence" id="pred-conf">Confidence: —</div>
      <div class="bars-title">All class probabilities</div>
      <div id="bars"></div>
    </div>
  </div>


  <script src="./app.js"></script>
</body>
</html>
